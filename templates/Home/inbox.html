{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header"><h3 class="page-title">Inbox</h3></div>
    <div class="card"><div class="card-body table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Message</th><th>Status</th><th>Created</th></tr></thead>
        <tbody>
          {% for item in all_notifications %}
          <tr>
            <td>{{ item.message }}</td>
            <td>{% if item.is_read %}Read{% else %}Unread{% endif %}</td>
            <td>{{ item.created_at }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="3">No messages.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div></div>
  </div>
</div>
{% endblock %}
