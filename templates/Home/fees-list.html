{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col"><h3 class="page-title">Fees Collection</h3></div>
        <div class="col-auto"><a href="{% url 'add_fees' %}" class="btn btn-primary">Add Fees</a></div>
      </div>
    </div>
    <div class="card"><div class="card-body table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Student</th><th>Amount</th><th>Paid On</th><th>Method</th><th>Reference</th></tr></thead>
        <tbody>
          {% for fee in fees %}
          <tr>
            <td>{{ fee.student_name }}</td>
            <td>{{ fee.amount }}</td>
            <td>{{ fee.paid_on }}</td>
            <td>{{ fee.payment_method }}</td>
            <td>{{ fee.reference }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="5">No fee records yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div></div>
  </div>
</div>
{% endblock %}
