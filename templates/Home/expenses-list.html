{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col"><h3 class="page-title">Expenses</h3></div>
        <div class="col-auto"><a href="{% url 'add_expenses' %}" class="btn btn-primary">Add Expense</a></div>
      </div>
    </div>
    <div class="card"><div class="card-body table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Title</th><th>Category</th><th>Amount</th><th>Date</th></tr></thead>
        <tbody>
          {% for item in expense_items %}
          <tr>
            <td>{{ item.title }}</td>
            <td>{{ item.category }}</td>
            <td>{{ item.amount }}</td>
            <td>{{ item.expense_date }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="4">No expenses yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div></div>
  </div>
</div>
{% endblock %}
