{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header">
      <div class="row align-items-center">
        <div class="col"><h3 class="page-title">Salary</h3></div>
        <div class="col-auto"><a href="{% url 'add_salary' %}" class="btn btn-primary">Add Salary</a></div>
      </div>
    </div>
    <div class="card"><div class="card-body table-responsive">
      <table class="table table-hover">
        <thead><tr><th>Staff</th><th>Month</th><th>Year</th><th>Amount</th><th>Paid On</th></tr></thead>
        <tbody>
          {% for item in salaries %}
          <tr>
            <td>{{ item.staff_name }}</td>
            <td>{{ item.month }}</td>
            <td>{{ item.year }}</td>
            <td>{{ item.amount }}</td>
            <td>{{ item.paid_on }}</td>
          </tr>
          {% empty %}
          <tr><td colspan="5">No salary records yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div></div>
  </div>
</div>
{% endblock %}
