{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper"><div class="content container-fluid">
  <div class="page-header"><div class="row align-items-center"><div class="col"><h3 class="page-title">Sports</h3></div><div class="col-auto"><a href="{% url 'add_sport' %}" class="btn btn-primary">Add Sports Activity</a></div></div></div>
  <div class="card"><div class="card-body table-responsive"><table class="table"><thead><tr><th>Activity</th><th>Coach</th><th>Date</th><th>Notes</th></tr></thead><tbody>{% for s in sports %}<tr><td>{{ s.activity_name }}</td><td>{{ s.coach_name|default:"-" }}</td><td>{{ s.activity_date }}</td><td>{{ s.notes|default:"-" }}</td></tr>{% empty %}<tr><td colspan="4">No sports activities yet.</td></tr>{% endfor %}</tbody></table></div></div>
</div></div>
{% endblock %}
