{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper"><div class="content container-fluid">
  <div class="page-header"><div class="row align-items-center"><div class="col"><h3 class="page-title">Hostel</h3></div><div class="col-auto"><a href="{% url 'add_hostel_record' %}" class="btn btn-primary">Add Hostel Record</a></div></div></div>
  <div class="card"><div class="card-body table-responsive"><table class="table"><thead><tr><th>Student</th><th>Room</th><th>Check-In</th><th>Guardian Contact</th></tr></thead><tbody>{% for h in hostels %}<tr><td>{{ h.student_name }}</td><td>{{ h.room_number }}</td><td>{{ h.check_in_date }}</td><td>{{ h.guardian_contact|default:"-" }}</td></tr>{% empty %}<tr><td colspan="4">No hostel records yet.</td></tr>{% endfor %}</tbody></table></div></div>
</div></div>
{% endblock %}
