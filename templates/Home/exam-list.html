{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper"><div class="content container-fluid">
  <div class="page-header"><div class="row align-items-center"><div class="col"><h3 class="page-title">Exams</h3></div><div class="col-auto"><a href="{% url 'add_exam' %}" class="btn btn-primary">Add Exam</a></div></div></div>
  <div class="card"><div class="card-body table-responsive"><table class="table"><thead><tr><th>Name</th><th>Subject</th><th>Date</th><th>Total Marks</th></tr></thead><tbody>{% for e in exams %}<tr><td>{{ e.name }}</td><td>{{ e.subject|default:"-" }}</td><td>{{ e.exam_date }}</td><td>{{ e.total_marks }}</td></tr>{% empty %}<tr><td colspan="4">No exams yet.</td></tr>{% endfor %}</tbody></table></div></div>
</div></div>
{% endblock %}
