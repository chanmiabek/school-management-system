{% extends 'Home/base.html' %}
{% block body %}
<div class="page-wrapper">
  <div class="content container-fluid">
    <div class="page-header"><h3 class="page-title">{{ page_title }}</h3></div>
    <div class="card"><div class="card-body">
      <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'subject_list' %}" class="btn btn-secondary">Cancel</a>
      </form>
    </div></div>
  </div>
</div>
{% endblock %}
